monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - bug_report
        - cv_experience_admin

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            cv_experience_admin:
                type: stream
                path: "%kernel.logs_dir%/cv_experience_admin_%kernel.environment%.log"
                level: debug
                channels: ["cv_experience_admin"]
            bug_report:
                type: stream
                path: "%kernel.logs_dir%/bug_report_%kernel.environment%.log"
                level: info
                channels: ["bug_report"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            bug_report:
                type: stream
                path: "%kernel.logs_dir%/bug_report_%kernel.environment%.log"
                level: info
                channels: ["bug_report"]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            bug_report:
                type: stream
                path: php://stderr
                level: info
                channels: ["bug_report"]
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
