framework:
  secret: '%env(APP_SECRET)%'
  http_method_override: false
  handle_all_throwables: true
  default_locale: en
  translator:
    default_path: '%kernel.project_dir%/translations'
    fallbacks:
      - en
      - fr
  php_errors:
    log: true
  session:
    enabled: true
    cookie_lifetime: 604800
    gc_maxlifetime: 604800
