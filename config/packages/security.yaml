security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  role_hierarchy:
    ROLE_ADMIN:
      - ROLE_USER
      - ROLE_SHARE_SEND
      - ROLE_SHARE_PUBLIC
      - ROLE_SHARE_FRIENDS
    ROLE_SHARE_SEND:
      - ROLE_SHARE

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider
      custom_authenticator: App\Security\LoginFormAuthenticator
      entry_point: App\Security\LoginFormAuthenticator
      remember_me:
        secret: '%kernel.secret%'
        lifetime: 2592000
        path: /
      logout:
        path: app_logout
        target: app_home

  access_control:
    - { path: ^/home/access, roles: PUBLIC_ACCESS }
    - { path: ^/home/captcha, roles: PUBLIC_ACCESS }
    - { path: ^/setup, roles: PUBLIC_ACCESS }
    - { path: ^/invite/activate, roles: PUBLIC_ACCESS }
    - { path: ^/password/forgot, roles: PUBLIC_ACCESS }
    - { path: ^/password/reset, roles: PUBLIC_ACCESS }
    - { path: ^/login/totp, roles: ROLE_USER }
    - { path: ^/login/check, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/logout, roles: PUBLIC_ACCESS }
    - { path: ^/p/, roles: PUBLIC_ACCESS }
    - { path: ^/download/public, roles: PUBLIC_ACCESS }
    - { path: ^/files, roles: ROLE_USER }
    - { path: ^/bug-report, roles: ROLE_USER }
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/profile, roles: ROLE_USER }
